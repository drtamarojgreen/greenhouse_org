# MeSH Discovery, Meta-Analysis, & Systems Synthesis Suite v10 Configuration
# Strictly structural configuration - zero clinical terms, stubs, or guidelines.

pipeline_version: "10.0.0"

# --- Ingestion & Discovery Settings ---
discovery:
  max_levels: 3
  level_thresholds:
    1: 10000
    2: 2500
    3: 500
  max_children_per_node: 6
  total_max_terms: 100

# --- Seed Exploration (--seed flag) ---
seed_exploration:
  default_terms:
    - "ADHD"
    - "Stress"
    - "Glutathione"
  max_depth: 3       # overrides discovery.max_levels for seed mode if set
  max_children: 3    # max branches per node (decays by 1 per level)
  max_seeds: 5       # hard cap on number of seed terms processed in one run

# --- Meta-Analysis Framework Parameters ---
meta_analysis:
  readiness_criteria:
    min_studies_pooled: 3
    min_sample_size_per_study: 15
    homogeneity_max_p_value: 0.05
  default_model: "random-effects"  # Options: "random-effects", "fixed-effects"
  confidence_level: 0.95
  heterogeneity_metrics: ["I2", "tau2", "Q"]
  effect_conversions:
    allowed_types: ["SMD", "OR", "RR", "HR"]
  multiplicity_control: "FDR"  # Options: "Bonferroni", "FDR", "Holm"

# --- Emerging Research Horizon Scanning Parameters ---
discovery_emerging:
  burst_detection:
    growth_multiplier: 1.5

# --- Neurobiological Modeling Simulation Parameters ---
neuro_modeling:
  simulation_steps: 24
  default_alpha: 0.05

# --- Infrastructure & Reproducibility Settings ---
infrastructure:
  studies_file: "scripts/research/mesh/v10/output/studies_database.json"
  cache_db: "scripts/research/mesh/v10/cache.db"
  output_dir: "scripts/research/mesh/v10/output"
  formats: ["json", "csv", "png", "svg"]
  data_retention_days: 365
  permission_model: "read-write-admin"
  fair_metadata:
    license: "CC-BY-4.0"
    repository: "https://github.com/drtamarojgreen/greenhouse_org"
    creator: "Greenhouse Org Research Group"

# --- External Reputable Resource APIs ---
reputable_resources:
  ncbi_pubmed_esummary: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi"
  openfda_drug_label: "https://api.fda.gov/drug/label.json"
  clinicaltrials_registry: "https://clinicaltrials.gov/api/v2/studies"

# --- Mock & Simulation Defaults ---
simulation_defaults:
  emerging_years: [2021, 2022, 2023, 2024, 2025]
  emerging_counts_burst: [2, 5, 12, 28, 62]
  emerging_counts_weak: [1, 2, 6, 12, 24]
  emerging_counts_steady: [22, 24, 25, 24, 23]
  emerging_cagr_burst: 88.5   # CAGR assigned to fastest-growing trial term
  emerging_cagr_weak: 52.0    # CAGR assigned to second trial term
  emerging_cagr_steady: 1.1   # CAGR for the steady physiological pathway term
  mock_nodes:
    - id: "Dynamic_1"
      label: "Intervention Pathway A"
    - id: "Dynamic_2"
      label: "Intervention Pathway B"

