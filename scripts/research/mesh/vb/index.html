<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse MeSH Discovery Command Generator (VB)</title>
    <style>
        :root {
            --primary-color: #4caf50;
            --secondary-color: #2e3d2f;
            --bg-color: #f0faf4;
            --text-color: #333;
            --border-radius: 8px;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 15px;
        }
        header img {
            max-height: 60px;
            margin-right: 20px;
        }
        h1 {
            color: var(--secondary-color);
            margin: 0;
            font-size: 1.8rem;
        }
        .description {
            margin-bottom: 25px;
            font-style: italic;
        }
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 30px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--secondary-color);
        }
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        .command-output-section {
            background: #2e3d2f;
            color: #fff;
            padding: 25px;
            border-radius: var(--border-radius);
            position: relative;
        }
        .command-output-section h3 {
            margin-top: 0;
            color: #4caf50;
            font-size: 1.1rem;
        }
        #command-display {
            font-family: 'Courier New', Courier, monospace;
            background: #1e281f;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
            font-size: 1rem;
        }
        .copy-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.2s, background 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .copy-btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }
        .copy-btn:active {
            transform: translateY(0);
        }
        .status-msg {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #4caf50;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="../../../../docs/images/Greenhouse_Logo.png" alt="Greenhouse Logo">
        <h1>MeSH Discovery Command Generator (VB)</h1>
    </header>

    <p class="description">Configure the MeSH Discovery parameters below to generate a command for local Linux execution.</p>

    <div class="config-grid">
        <div class="form-group">
            <label for="seed-term">Seed Term</label>
            <input type="text" id="seed-term" value="Mental Health" placeholder="e.g. Depression">
        </div>
        <div class="form-group">
            <label for="depth">Max Depth</label>
            <input type="number" id="depth" value="2" min="1" max="5">
        </div>
        <div class="form-group">
            <label for="threshold">Min Pub. Count</label>
            <input type="number" id="threshold" value="5000" step="500">
        </div>
        <div class="form-group">
            <label for="max-terms">Max Terms</label>
            <input type="number" id="max-terms" value="20" min="5" max="100">
        </div>
    </div>

    <div class="command-output-section">
        <h3>Generated Linux Command</h3>
        <div id="command-display">python3 scripts/research/mesh/vb/discovery.py --seed "Mental Health" --depth 2 --threshold 5000 --max-terms 20</div>

        <button class="copy-btn" id="copy-btn">
            <span>📋</span> Copy Command
        </button>
        <div id="status-msg" class="status-msg"></div>
    </div>
</div>

<script>
    const seedInput = document.getElementById('seed-term');
    const depthInput = document.getElementById('depth');
    const thresholdInput = document.getElementById('threshold');
    const maxTermsInput = document.getElementById('max-terms');
    const commandDisplay = document.getElementById('command-display');
    const copyBtn = document.getElementById('copy-btn');
    const statusMsg = document.getElementById('status-msg');

    function updateCommand() {
        const seed = seedInput.value.replace(/"/g, '\\"');
        const depth = depthInput.value;
        const threshold = thresholdInput.value;
        const maxTerms = maxTermsInput.value;

        const cmd = `python3 scripts/research/mesh/vb/discovery.py --seed "${seed}" --depth ${depth} --threshold ${threshold} --max-terms ${maxTerms}`;
        commandDisplay.textContent = cmd;
    }

    [seedInput, depthInput, thresholdInput, maxTermsInput].forEach(input => {
        input.addEventListener('input', updateCommand);
    });

    copyBtn.addEventListener('click', async () => {
        const command = commandDisplay.textContent;
        try {
            await navigator.clipboard.writeText(command);
            statusMsg.textContent = 'Command copied to clipboard!';

            // Visual feedback on button
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<span>✅</span> Copied!';
            copyBtn.style.backgroundColor = '#2e3d2f';

            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                copyBtn.style.backgroundColor = '';
                statusMsg.textContent = '';
            }, 3000);
        } catch (err) {
            console.error('Failed to copy: ', err);
            statusMsg.textContent = 'Failed to copy command.';
            statusMsg.style.color = '#f44336';
        }
    });
</script>

</body>
</html>
